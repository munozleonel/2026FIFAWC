name: Update World Cup Data

on:
  schedule:
    - cron: '0 */3 * * *'     # Every 3 hours
  workflow_dispatch:          # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest World Cup data
        run: |
          mkdir -p data
          curl -o data/worldcup.json https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.json
          if git diff --staged --quiet; then
            echo "No changes to data"
          else
            git commit -m "Update World Cup data - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
